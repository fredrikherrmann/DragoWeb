<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="#111111">
  <!-- Dragon head silhouette - sleek, minimal, facing right -->
  <g transform="translate(60,60)">
    <!-- Main head shape -->
    <path d="
      M -5 -45
      C 5 -48, 15 -42, 20 -35
      C 25 -28, 22 -20, 25 -15
      C 28 -10, 35 -8, 40 -12
      C 42 -14, 44 -18, 48 -22
      C 46 -16, 44 -10, 42 -5
      C 40 0, 38 3, 40 8
      C 42 12, 48 14, 50 10
      C 48 16, 44 18, 40 16
      C 36 14, 32 10, 28 12
      C 24 14, 22 18, 24 22
      C 26 26, 30 28, 28 32
      C 26 36, 20 38, 14 36
      C 8 34, 4 28, 0 22
      C -4 16, -8 12, -14 10
      C -20 8, -26 12, -30 18
      C -32 22, -28 28, -24 32
      C -28 28, -32 22, -34 16
      C -36 10, -34 4, -30 0
      C -26 -4, -22 -6, -20 -12
      C -18 -18, -16 -24, -14 -30
      C -12 -36, -10 -42, -5 -45
      Z
    " />
    <!-- Horn -->
    <path d="
      M 15 -38
      C 18 -45, 25 -50, 30 -52
      C 26 -46, 22 -40, 20 -35
    " />
    <!-- Second horn -->
    <path d="
      M 5 -44
      C 6 -52, 12 -56, 16 -55
      C 12 -50, 8 -46, 6 -42
    " />
    <!-- Eye -->
    <circle cx="12" cy="-25" r="3" fill="#f0f0f0" />
    <circle cx="13" cy="-25" r="1.5" fill="#111111" />
    <!-- Nostril -->
    <ellipse cx="38" cy="2" rx="2" ry="1.5" fill="#f0f0f0" />
    <!-- Jaw detail / teeth hints -->
    <path d="
      M 30 12 L 33 8 L 36 12 L 39 8 L 42 12
    " fill="none" stroke="#f0f0f0" stroke-width="1.2" />
    <!-- Neck scales -->
    <path d="M -10 -30 C -6 -28, -4 -24, -8 -22" fill="none" stroke="#333" stroke-width="0.8" opacity="0.3" />
    <path d="M -12 -22 C -8 -20, -6 -16, -10 -14" fill="none" stroke="#333" stroke-width="0.8" opacity="0.3" />
    <path d="M -14 -14 C -10 -12, -8 -8, -12 -6" fill="none" stroke="#333" stroke-width="0.8" opacity="0.3" />
  </g>
</svg>
